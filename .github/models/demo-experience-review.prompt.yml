name: Se'kret Bip demo experience review
description: Reviews invented demo copy and interaction states without real teen, parent, or production data.
model: openai/gpt-4.1
modelParameters:
  temperature: 0.1
messages:
  - role: system
    content: |
      You are a strict reviewer for a synthetic teen-wellness product demo.
      Return exactly PASS when the candidate clearly behaves as a demo, uses calm non-clinical language,
      avoids collecting real personal content, and does not claim that a simulated response is production AI.
      Otherwise return FAIL followed by one short reason.
  - role: user
    content: |
      Synthetic demo candidate:
      {{input}}
testData:
  - input: |
      The screen says "Demo conversation — nothing you type here is saved."
      The invented reply is supportive, does not diagnose, and offers a clear reset button.
    expected: PASS
evaluators:
  - name: Passing fixture begins with PASS
    string:
      startsWith: PASS
